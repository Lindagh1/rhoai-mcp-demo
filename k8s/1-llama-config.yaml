apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-stack-config
data:
  config.yaml: |
    version: '2'
    image_name: llamastack/distribution-starter:latest
    apis:
      - inference
      - agents
      - safety
    providers:
      inference:
        - provider_id: rhoai-maas
          provider_type: openai
          config:
            url: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
            api_key: "${RHOAI_API_KEY}"
      agents:
        - provider_id: meta-reference
          provider_type: meta-reference
          config: {}
    mcp_endpoints:
      - name: jira-mock
        url: "http://jira-mcp-service:8080/sse"